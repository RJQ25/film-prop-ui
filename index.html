<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Media Giveaway Portal</title>
    <style>
        /* CSS to make it look flashy and obvious for a camera shot */
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .main-container {
            background: linear-gradient(135deg, #1a1a1a, #001a33);
            border: 4px solid #00ccff;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            width: 80%;
            max-width: 650px; /* Slightly widened to comfortably fit the single line */
            box-shadow: 0 0 30px rgba(0, 204, 255, 0.5);
            position: relative;
            z-index: 1;
        }

        h1 {
            color: #00ccff;
            font-size: 1.8em; /* Reduced slightly */
            white-space: nowrap; /* Forces text to stay on a single line */
            margin-top: 0;
            text-transform: uppercase;
            text-shadow: 2px 2px 5px #000;
            animation: pulse 1.5s infinite;
        }

        p {
            font-size: 1.2em;
            margin-bottom: 30px;
            color: #e0e0e0;
            line-height: 1.5;
        }

        .highlight {
            color: #ffcc00;
            font-weight: bold;
        }

        .input-group {
            margin-bottom: 25px;
        }

        input[type="text"] {
            width: 90%;
            padding: 15px;
            font-size: 1.1em;
            border: 2px solid #555;
            border-radius: 8px;
            background-color: #222;
            color: #fff;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #00ccff;
        }

        button {
            background: linear-gradient(to bottom, #00ccff, #0088cc);
            color: #fff;
            font-weight: bold;
            font-size: 1.3em;
            padding: 15px 40px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(0, 136, 204, 0.4);
            transition: transform 0.1s;
        }

        button:active {
            transform: scale(0.95);
        }

        /* The Pop-up Overlay (Hidden by default) */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 10;
            justify-content: center;
            align-items: center;
        }

        .popup-box {
            background-color: #002200;
            border: 3px solid #00ff00;
            padding: 50px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 255, 0, 0.4);
            animation: popIn 0.3s ease-out;
        }

        .popup-box h2 {
            color: #00ff00;
            font-size: 3em;
            margin: 0 0 15px 0;
            text-shadow: 0 0 10px #00ff00;
        }

        .popup-box p {
            color: #fff;
            font-size: 1.5em;
            margin: 0;
        }

        /* Animations for visual flair on screen */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h1>SPONSORED GIVEAWAY WINNER!</h1>
        <p>You clicked the <span class="highlight">Lucky Link</span> in your feed! Please provide your physical delivery address below to claim your cash reward immediately.</p>
        
        <div class="input-group">
            <input type="text" id="addressField" placeholder="Enter Full Address (e.g., 123 Main St...)">
        </div>
        
        <button onclick="triggerPopup()">Confirm & Claim</button>
    </div>

    <div class="overlay" id="successOverlay">
        <div class="popup-box">
            <h2>CONGRATULATIONS!</h2>
            <p>Processing complete. Just wait for your reward.</p>
        </div>
    </div>

    <script>
        function triggerPopup() {
            // Check if the actor typed something in the field before clicking
            const address = document.getElementById('addressField').value;
            
            if (address.trim() === "") {
                // Flashes red if the actor forgets to type before clicking
                document.getElementById('addressField').style.borderColor = "red";
                return; 
            }

            // Show the overlay
            document.getElementById('successOverlay').style.display = 'flex';
        }
    </script>

</body>
</html>
